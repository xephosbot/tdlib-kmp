name: Test

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Run Linux native tests
        run: ./gradlew :tdlib:linuxX64Test
      - name: Run JVM tests
        run: ./gradlew :tdlib:jvmTest

  test-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Run macOS native tests
        run: ./gradlew :tdlib:macosArm64Test
      - name: Run iOS simulator tests
        run: ./gradlew :tdlib:iosSimulatorArm64Test
